name: Integration Tests

# This workflow is referenced by ci.yml via `needs: integration` but can also
# be triggered manually to re-run the full end-to-end suite.
on:
  workflow_dispatch:
  # Re-usable from ci.yml.
  workflow_call:

jobs:
  integration:
    name: End-to-end scenarios
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      # Build the relic binary so integration tests can exec it directly.
      - name: Build relic binary
        run: go build -o bin/relic ./cmd/relic

      # Build the test MCP server fixture.
      - name: Build mcp-test-server
        run: go build -o bin/mcp-test-server ./test/fixtures

      # Install jq for trace assertions in scenario shell checks.
      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Run Go integration tests
        run: |
          go test -v -count=1 -timeout=120s \
            -run TestScenario \
            ./test/integration/
        env:
          # Tell integration tests where the pre-built binaries live.
          RELIC_BIN: ${{ github.workspace }}/bin/relic
          MCP_SERVER_BIN: ${{ github.workspace }}/bin/mcp-test-server

      # -----------------------------------------------------------------------
      # Shell-based jq assertions for quick sanity checking.
      # These are intentionally simpler than the Go tests; they exercise the
      # binary from a user's perspective.
      # -----------------------------------------------------------------------
      - name: Scenario A — permissive mode (jq assertions)
        run: |
          WORK=$(mktemp -d)
          mkdir -p "$WORK/.tr/traces"

          # mcp.yaml points at the test server.
          cat > "$WORK/.tr/mcp.yaml" <<EOF
          servers:
            - name: test
              transport: stdio
              command: ${{ github.workspace }}/bin/mcp-test-server
              args: []
          EOF

          # Agent: send initialize + two tool calls, then exit.
          AGENT="$WORK/agent.sh"
          cat > "$AGENT" <<'SCRIPT'
          #!/bin/bash
          printf '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2024-11-05","clientInfo":{"name":"ci","version":"0.1"},"capabilities":{}}}\n'
          printf '{"jsonrpc":"2.0","method":"notifications/initialized"}\n'
          printf '{"jsonrpc":"2.0","id":2,"method":"tools/call","params":{"name":"echo","arguments":{"message":"hello"}}}\n'
          printf '{"jsonrpc":"2.0","id":3,"method":"tools/call","params":{"name":"add","arguments":{"a":1,"b":2}}}\n'
          SCRIPT
          chmod +x "$AGENT"

          cd "$WORK"
          "${{ github.workspace }}/bin/relic" run --trace-dir .tr/traces --quiet -- "$AGENT"

          TRACE=$(ls .tr/traces/*.trtrace | head -1)
          echo "=== Trace: $TRACE ==="
          cat "$TRACE"

          # Verify both actions have auth=allow (no policy → permissive).
          ALLOW_COUNT=$(grep '"t":"action"' "$TRACE" | jq -r '.auth' | grep -c "^allow$" || true)
          if [ "$ALLOW_COUNT" -ne 2 ]; then
            echo "FAIL: expected 2 allow actions, got $ALLOW_COUNT"
            exit 1
          fi
          echo "PASS: scenario A — $ALLOW_COUNT allow actions"

      - name: Scenario B — restrictive policy (jq assertions)
        run: |
          WORK=$(mktemp -d)
          mkdir -p "$WORK/.tr/traces"

          cat > "$WORK/.tr/mcp.yaml" <<EOF
          servers:
            - name: test
              transport: stdio
              command: ${{ github.workspace }}/bin/mcp-test-server
              args: []
          EOF

          cat > "$WORK/.tr/policy.yaml" <<'EOF'
          version: "1"
          agent:
            name: ci-test
            version: "0.0.1"
          mode: enforce
          default: deny
          rules:
            - id: allow-echo
              protocol: mcp
              method: tool_call
              target: "echo"
              action: allow
          EOF

          AGENT="$WORK/agent.sh"
          cat > "$AGENT" <<'SCRIPT'
          #!/bin/bash
          printf '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2024-11-05","clientInfo":{"name":"ci","version":"0.1"},"capabilities":{}}}\n'
          printf '{"jsonrpc":"2.0","method":"notifications/initialized"}\n'
          printf '{"jsonrpc":"2.0","id":2,"method":"tools/call","params":{"name":"echo","arguments":{"message":"hello"}}}\n'
          printf '{"jsonrpc":"2.0","id":3,"method":"tools/call","params":{"name":"add","arguments":{"a":1,"b":2}}}\n'
          SCRIPT
          chmod +x "$AGENT"

          cd "$WORK"
          "${{ github.workspace }}/bin/relic" run --trace-dir .tr/traces --quiet -- "$AGENT" || true

          TRACE=$(ls .tr/traces/*.trtrace | head -1)
          echo "=== Trace: $TRACE ==="
          cat "$TRACE"

          ALLOW=$(grep '"t":"action"' "$TRACE" | jq -r '.auth' | grep -c "^allow$" || true)
          DENY=$(grep '"t":"action"' "$TRACE" | jq -r '.auth' | grep -c "^deny$" || true)
          if [ "$ALLOW" -ne 1 ] || [ "$DENY" -ne 1 ]; then
            echo "FAIL: expected 1 allow + 1 deny, got allow=$ALLOW deny=$DENY"
            exit 1
          fi
          echo "PASS: scenario B — allow=$ALLOW deny=$DENY"

      - name: Scenario C — redaction (jq assertions)
        run: |
          WORK=$(mktemp -d)
          mkdir -p "$WORK/.tr/traces"

          cat > "$WORK/.tr/mcp.yaml" <<EOF
          servers:
            - name: test
              transport: stdio
              command: ${{ github.workspace }}/bin/mcp-test-server
              args: []
          EOF

          cat > "$WORK/.tr/policy.yaml" <<'EOF'
          version: "1"
          agent:
            name: ci-test
            version: "0.0.1"
          mode: enforce
          default: deny
          redaction:
            keys: ["password"]
            headers: []
          rules:
            - id: allow-secret
              protocol: mcp
              method: tool_call
              target: "secret"
              action: allow
          EOF

          AGENT="$WORK/agent.sh"
          cat > "$AGENT" <<'SCRIPT'
          #!/bin/bash
          printf '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2024-11-05","clientInfo":{"name":"ci","version":"0.1"},"capabilities":{}}}\n'
          printf '{"jsonrpc":"2.0","method":"notifications/initialized"}\n'
          printf '{"jsonrpc":"2.0","id":2,"method":"tools/call","params":{"name":"secret","arguments":{"password":"my-secret-password"}}}\n'
          SCRIPT
          chmod +x "$AGENT"

          cd "$WORK"
          "${{ github.workspace }}/bin/relic" run --trace-dir .tr/traces --quiet -- "$AGENT"

          TRACE=$(ls .tr/traces/*.trtrace | head -1)
          echo "=== Trace: $TRACE ==="
          cat "$TRACE"

          if grep -q "my-secret-password" "$TRACE"; then
            echo "FAIL: plaintext password found in trace"
            exit 1
          fi
          if ! grep -q "REDACTED" "$TRACE"; then
            echo "FAIL: [REDACTED] not found in trace"
            exit 1
          fi
          echo "PASS: scenario C — password redacted"

      - name: Scenario D — HTTP metadata logger (jq assertions)
        run: |
          WORK=$(mktemp -d)
          mkdir -p "$WORK/.tr/traces"

          # No MCP servers needed — just test HTTP interception.
          # Agent: use curl to make an HTTP request through the proxy.
          AGENT="$WORK/agent.sh"
          cat > "$AGENT" <<'SCRIPT'
          #!/bin/bash
          # HTTP_PROXY is set by relic run to point at the HTTP logger.
          curl -s --proxy "$HTTP_PROXY" http://httpbin.org/get -o /dev/null --connect-timeout 5 || true
          SCRIPT
          chmod +x "$AGENT"

          cd "$WORK"
          "${{ github.workspace }}/bin/relic" run --trace-dir .tr/traces --quiet -- "$AGENT" || true

          TRACE=$(ls .tr/traces/*.trtrace | head -1)
          echo "=== Trace: $TRACE ==="
          cat "$TRACE"

          # There should be at least the run-start and run-end events.
          EVENT_COUNT=$(wc -l < "$TRACE")
          if [ "$EVENT_COUNT" -lt 2 ]; then
            echo "FAIL: expected at least 2 trace events, got $EVENT_COUNT"
            exit 1
          fi
          echo "PASS: scenario D — trace has $EVENT_COUNT events"
          # Note: HTTP action event presence depends on network availability.
          # We verify the proxy starts and sets HTTP_PROXY regardless.
          HTTP_ACTION=$(grep -c '"proto":"http"' "$TRACE" || true)
          echo "INFO: HTTP action events: $HTTP_ACTION"
