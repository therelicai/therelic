name: CI

on:
  push:
    branches: ["**"]
    tags: ["v*"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:

jobs:
  # -------------------------------------------------------------------------
  # Lint — golangci-lint on every push / PR
  # -------------------------------------------------------------------------
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest

  # -------------------------------------------------------------------------
  # Unit tests — run on every push / PR
  # -------------------------------------------------------------------------
  test:
    name: Unit tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify dependencies
        run: go mod verify

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test (race detector + coverage)
        run: go test -race -count=1 -coverprofile=coverage.out ./...

      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@v4
        with:
          files: coverage.out
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  # -------------------------------------------------------------------------
  # Security — vulnerability scanning
  # -------------------------------------------------------------------------
  vulncheck:
    name: Vulnerability check
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: govulncheck ./...
        continue-on-error: true

  # -------------------------------------------------------------------------
  # Integration tests — run on every push / PR (Linux only for speed)
  # -------------------------------------------------------------------------
  integration:
    name: Integration tests
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run integration tests
        run: go test -v -count=1 -timeout=120s ./test/integration/

  # -------------------------------------------------------------------------
  # CLI smoke — exercises `relic run` end-to-end with HMAC sealing on.
  # Catches any regression in the cli wiring (NewTraceWriterWithKey,
  # GenerateChainKey, sealEventLine) that pure-package tests would
  # miss because they exercise the trace package directly. The
  # platform parser's matching test suite lives in therelic-platform
  # CI; both jobs together cover cross-repo wire-format drift.
  # -------------------------------------------------------------------------
  cli-smoke:
    name: CLI smoke (relic run + trace verify)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Build relic CLI
        run: go build -o /tmp/relic ./cmd/relic
      - name: relic init + run + verify
        env:
          RELIC_TRACE_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
        run: |
          mkdir -p ci-smoke && cd ci-smoke
          /tmp/relic init --force
          # /usr/bin/true is the canonical no-op; we just need any
          # process the runtime can wrap successfully. The point is
          # that a run-start + run-end event get written and sealed.
          /tmp/relic run --mode permissive -- /usr/bin/true
          ls -la .tr/traces
          trace=$(ls .tr/traces/*.trtrace | head -n1)
          /tmp/relic trace verify --key "$RELIC_TRACE_KEY" "$trace"

  # -------------------------------------------------------------------------
  # Release — triggered only on semver tags (e.g. v0.1.0)
  # -------------------------------------------------------------------------
  release:
    name: Release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [lint, test, integration, vulncheck]
    permissions:
      contents: write
    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
